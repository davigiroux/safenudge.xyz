[toolchain]
anchor_version = "1.0.2"

[features]
resolution = true
skip-lint = false

[programs.devnet]
safenudge = "88vmqe9yLF4mYtamaX53Cwg66GaxzyH391bQudcA8FcB"

# anchor-litesvm's fromWorkspace() hard-codes a lookup of programs.localnet,
# so this block must stay present for the in-process test suite to load. The
# program ID is the same as the devnet entry above.
[programs.localnet]
safenudge = "88vmqe9yLF4mYtamaX53Cwg66GaxzyH391bQudcA8FcB"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
