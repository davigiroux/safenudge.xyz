[toolchain]
anchor_version = "1.0.2"

[features]
resolution = true
skip-lint = false

[programs.devnet]
safenudge = "88vmqe9yLF4mYtamaX53Cwg66GaxzyH391bQudcA8FcB"

# Uncomment + comment out [programs.devnet] above to iterate against an in-process
# LiteSVM or local validator. Production deploys target devnet only.
# [programs.localnet]
# safenudge = "88vmqe9yLF4mYtamaX53Cwg66GaxzyH391bQudcA8FcB"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
