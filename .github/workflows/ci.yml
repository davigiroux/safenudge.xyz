name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Anchor 1.0.x ships its own bundled cargo-build-sbf with current Rust, so
  # we no longer need to pin a Solana CLI for the SBF toolchain. We still
  # install one so the runner can run `solana-keygen new` and `anchor` can
  # find it on PATH if it ever shells out (the test path uses LiteSVM, an
  # in-process VM, instead of any RPC).
  SOLANA_VERSION: v3.1.10
  ANCHOR_VERSION: 1.0.2
  NODE_VERSION: 22

jobs:
  program:
    name: Anchor build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Solana install
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana/install
          key: ${{ runner.os }}-solana-${{ env.SOLANA_VERSION }}

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI
        # Skip avm — it can fail to bootstrap on a fresh runner. Install
        # anchor-cli directly at the pinned tag with --locked so cargo uses
        # Anchor's bundled Cargo.lock.
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            --tag v${{ env.ANCHOR_VERSION }} \
            anchor-cli --locked --force

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install workspace dev deps
        run: npm install --no-audit --no-fund

      - name: Generate keypair for builds
        run: |
          mkdir -p ~/.config/solana
          solana-keygen new --no-bip39-passphrase --silent --outfile ~/.config/solana/id.json

      # `--ignore-keys` because anchor 1.0 generates a fresh program keypair
      # on first build that does not match the `declare_id!()` baked into
      # the source. The mismatch is benign for our LiteSVM tests, which
      # load the .so at the address `declare_id!()` declares.
      - run: anchor build --ignore-keys

      - name: Run integration tests (LiteSVM, in-process)
        run: npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts

  frontend:
    name: Frontend tsc & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json
      # `npm install` (not `npm ci`) so the runner can resolve Linux-only
      # optional binary deps (`@emnapi/*`, etc.) that are absent from a
      # macOS-generated lockfile.
      - run: npm install --no-audit --no-fund
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          # Build needs these set; values do not matter for type / build pass.
          VITE_SOLANA_RPC_URL: https://api.devnet.solana.com
          VITE_PROGRAM_ID: 88vmqe9yLF4mYtamaX53Cwg66GaxzyH391bQudcA8FcB
          VITE_USDC_MINT: 4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU

  security-lint:
    name: Security lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for raw arithmetic on numeric types in program
        # Anchor programs MUST use checked_{add,sub,mul,div} on u64/i64/u128.
        # See CLAUDE.md "Forbidden patterns".
        run: |
          set -e
          # Strip line comments first so commentary doesn't trigger.
          if grep -rn --include="*.rs" -E '\b(let|return|=)\s*[a-zA-Z_][a-zA-Z0-9_]*\s*[+\-*/]\s*[a-zA-Z0-9_]' \
               programs/safenudge/src/ \
             | grep -v '//' \
             | grep -vE 'checked_(add|sub|mul|div)' \
             | grep -vE '\.checked_'; then
            echo "ERROR: Possible raw arithmetic detected. Use checked_add/sub/mul/div on numeric types."
            exit 1
          fi
          echo "No raw arithmetic suspects."

      - name: Check for hardcoded UI strings in frontend components
        run: |
          set -e
          if grep -rn --include="*.tsx" --include="*.ts" \
               -E '"(Depositar|Criar grupo|Entrar no grupo|Create group|Deposit now|Join group)"' \
               app/src/components/ app/src/pages/ 2>/dev/null \
             | grep -vE "(\.test\.|t\()"; then
            echo "ERROR: Possible hardcoded UI string found. Route through i18next t()."
            exit 1
          fi
          echo "No hardcoded UI string suspects."

      - name: Check for sensitive values in committed code
        run: |
          set -e
          if grep -rn --include="*.ts" --include="*.tsx" --include="*.rs" --include="*.toml" \
               -E 'ramp_live_|sk_live_|-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----' \
               app/src/ programs/ 2>/dev/null; then
            echo "ERROR: Sensitive value detected in source code."
            exit 1
          fi
          echo "No sensitive value suspects."

  audit:
    name: Dependency audits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      # Audits are advisory: a known CVE in a transitive dep should be visible
      # in the logs but must not fail the PR. Using `continue-on-error` at the
      # step level (rather than the job level) keeps the job's conclusion as
      # success while preserving the per-step output so advisories show up in
      # the workflow run summary.
      - name: cargo audit
        continue-on-error: true
        run: |
          cargo install cargo-audit --locked
          cargo audit
      - name: npm audit (app)
        continue-on-error: true
        working-directory: ./app
        run: npm audit --omit=dev
